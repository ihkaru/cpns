<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d11" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <title>AksaraCAT - Latihan & Simulasi CAT CPNS</title>
    
    <!-- Framework7 Icons & Material Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/framework7-icons@4.0.2/css/framework7-icons.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />

    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  </head>
  <body>
    <div id="debug-err" style="color: #ef4444; background: #0f172a; border: 2px solid #ef4444; padding: 20px; font-family: monospace; font-size: 14px; position: fixed; top: 0; left: 0; right: 0; z-index: 999999; max-height: 50vh; overflow-y: auto; display: none; white-space: pre-wrap; box-shadow: 0 10px 25px rgba(0,0,0,0.5);"></div>
    <script>
      function showError(msg) {
        var el = document.getElementById('debug-err');
        if (el) {
          el.style.display = 'block';
          el.innerText += '\n' + msg;
        }
      }
      window.addEventListener('error', function(e) {
        showError('ERROR: ' + e.message + ' at ' + e.filename + ':' + e.lineno + ':' + e.colno);
      });
      window.addEventListener('unhandledrejection', function(e) {
        showError('UNHANDLED REJECTION: ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason));
      });
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
