name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          bun install --frozen-lockfile

      - name: Build Web Client
        run: |
          cd frontend
          bun run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://aksaracat-api.example.com' }}

      - name: Sync Capacitor
        run: |
          cd frontend
          bunx cap sync android

      - name: Decode Android Keystore
        if: env.HAS_KEYSTORE == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > frontend/android/app/aksaracat-release.keystore
        env:
          HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x frontend/android/gradlew

      - name: Build Android Release APK
        run: |
          cd frontend/android
          ./gradlew assembleRelease
        env:
          RELEASE_STORE_FILE: aksaracat-release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Rename APK for Release
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v$(node -p "require('./frontend/package.json').version")"
          fi
          echo "Version determined: $VERSION"

          APK_PATH="frontend/android/app/build/outputs/apk/release/app-release.apk"
          UNSIGNED_APK_PATH="frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk"

          if [ -f "$APK_PATH" ]; then
            # If signed successfully
            cp "$APK_PATH" "AksaraCAT-${VERSION}.apk"
          elif [ -f "$UNSIGNED_APK_PATH" ]; then
            # Fallback to unsigned if secrets were not configured yet
            cp "$UNSIGNED_APK_PATH" "AksaraCAT-${VERSION}-unsigned.apk"
          else
            echo "Error: No APK file generated!"
            exit 1
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AksaraCAT-Android-APK
          path: AksaraCAT-v*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: AksaraCAT-v*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
